name: Gunluk Mobil Bozum Postu

on:
  schedule:
    # GitHub cron UTC ile calisir (TR = UTC+3) ve saat dilimi AYARLANAMAZ.
    # GitHub tam saat basi cron'lari yogunlukta DUSURUR -> bu yuzden her pencerede
    # birden fazla YEDEK saat var ve script ayni gun ayni slotu iki kez ATMAZ
    # (gonderilenler.txt durum dosyasi). Biri duserse sonraki yedek garanti gonderir.
    #
    # Sabah penceresi (UTC < 12 -> slot 0):  08:17 / 09:17 / 10:17 TR
    - cron: "17 5,6,7 * * *"
    # Ogleden sonra penceresi (UTC >= 12 -> slot 1):  16:17 / 17:17 / 18:17 TR
    - cron: "17 13,14,15 * * *"
  workflow_dispatch:        # Istersen "Run workflow" ile elle de calistirabilirsin.

# Durum dosyasini (gonderilenler.txt) repoya commit edebilmek icin yazma izni gerekli.
permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu al
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Gunluk postu gonder
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: python gunluk_post.py
