name: Gunluk Mobil Bozum Postu

on:
  # ASIL tetikleyici: disaridan (cron-job.org) repository_dispatch ile gelir.
  # GitHub'in kendi 'schedule' cron'u guvenilmez (tetiklemeleri geciktirir/dusurur),
  # o yuzden asil tetikleme DISARIDAN gelir; schedule sadece SEYREK YEDEK.
  # cron-job.org SADECE dogru saat penceresinde (TR sabah/ogleden sonra) tetikler;
  # cunku script slot penceresinde ILK tetiklemede gonderir (erken saatte atmasin diye).
  repository_dispatch:
    types: [mobilbozum-post]
  schedule:
    # Yedek (cron-job.org duserse). Script ayni slotu gunde 1 kez atar
    # (gonderilenler.txt durum dosyasi); fazladan tetikleme erken cikar, cift post olmaz.
    # Sabah penceresi (UTC < 12 -> slot 0): TR 08:17 ... 12:17
    - cron: "17 5,6,7,8,9 * * *"
    # Ogleden sonra penceresi (UTC >= 12 -> slot 1): TR 16:17 ... 20:17
    - cron: "17 13,14,15,16,17 * * *"
  workflow_dispatch:        # Istersen "Run workflow" ile elle de calistirabilirsin.

# Durum dosyasini (gonderilenler.txt) repoya commit edebilmek icin yazma izni gerekli.
permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu al
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Gunluk postu gonder
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: python gunluk_post.py
