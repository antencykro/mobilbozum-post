name: Gunluk Mobil Bozum Postu

on:
  schedule:
    # GitHub cron UTC ile calisir (TR = UTC+3) ve saat dilimi AYARLANAMAZ.
    # GitHub cron'lari yogunlukta GECIKTIRIR/DUSURUR -> bu yuzden her pencerede
    # COK SAYIDA yedek deneme var (saatte 4 kez, kaymali dakikalarda: yogunlugun
    # en yuksek oldugu tam saat/yarim saat noktalarindan KACINILDI). Script ayni
    # gun ayni slotu iki kez ATMAZ (gonderilenler.txt durum dosyasi); fazladan
    # tetiklemeler erken cikip hicbir sey gondermez. 24 denemenin HEPSI birden
    # dusmedikce sabah postu GARANTI gider.
    #
    # Sabah penceresi (UTC < 12 -> slot 0): TR 07:06 ... 12:51 arasi her 15 dk
    - cron: "6,21,36,51 4,5,6,7,8,9 * * *"
    # Ogleden sonra penceresi (UTC >= 12 -> slot 1): TR 16:06 ... 20:51 arasi her 15 dk
    - cron: "6,21,36,51 13,14,15,16,17 * * *"
  workflow_dispatch:        # Istersen "Run workflow" ile elle de calistirabilirsin.

# Durum dosyasini (gonderilenler.txt) repoya commit edebilmek icin yazma izni gerekli.
permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu al
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Gunluk postu gonder
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: python gunluk_post.py
