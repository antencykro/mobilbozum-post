name: Gunluk Mobil Bozum Postu

on:
  schedule:
    # GitHub cron UTC saatiyle çalışır. 17:00 UTC = 20:00 Türkiye saati (UTC+3).
    - cron: "0 17 * * *"
  workflow_dispatch:   # İstersen "Run workflow" ile elle de çalıştırabilirsin.

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu al
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Gunluk postu gonder
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: python gunluk_post.py
