name: Gunluk Mobil Bozum Postu

on:
  schedule:
    # GitHub cron UTC saatiyle calisir (TR = UTC+3).
    - cron: "0 5 * * *"    # 08:00 TR  -> sabah  (SLOT 0)
    - cron: "0 13 * * *"   # 16:00 TR  -> ogleden sonra (SLOT 1)
  workflow_dispatch:       # Istersen "Run workflow" ile elle de calistirabilirsin.

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu al
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Gunluk postu gonder
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          # 16:00 cron'u SLOT=1 (ogleden sonra), digerleri SLOT=0 (sabah/elle)
          SLOT: ${{ github.event.schedule == '0 13 * * *' && '1' || '0' }}
        run: python gunluk_post.py
